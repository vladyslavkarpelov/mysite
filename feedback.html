<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відгук про сайт | Інформер</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Залиште свій відгук</h1>
        <nav>
            <ul>
                <li><a href="index.html" class="home-link"><span class="material-icons">home</span> Головна</a></li>
                <li><a href="about.html"><span class="material-icons">info</span> Мій вибір</a></li>
                <li><a href="gallery.html"><span class="material-icons">photo_library</span> Фотогалерея</a></li>
                <li><a href="feedback.html"><span class="material-icons">feedback</span> Відгук</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2><span class="material-icons">rate_review</span> Ваша думка допоможе мені стати кращим економістом!</h2>
        
        <!-- form дійсна, дані підуть на FormSubmit -->
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name"><span class="material-icons">person</span> Ваше ім'я:</label>
                <input type="text" id="name" name="name" placeholder="Владислав" required>
            </div>
            <div class="form-group">
                <label for="email"><span class="material-icons">email</span> Email:</label>
                <input type="email" id="email" name="email" placeholder="vlad@economist.ua" required>
            </div>
            <div class="form-group">
                <label><span class="material-icons">star</span> Оцініть сайт:</label>
                <label><input type="radio" name="rating" value="Чудово" required> Чудово</label>
                <label><input type="radio" name="rating" value="Добре"> Добре</label>
                <label><input type="radio" name="rating" value="Задовільно"> Задовільно</label>
            </div>
            <div class="form-group">
                <label for="message"><span class="material-icons">comment</span> Ваш відгук або порада:</label>
                <textarea id="message" name="message" rows="4" placeholder="Що варто покращити? Яка тема цікавить?" required></textarea>
            </div>
            <button type="submit"><span class="material-icons">send</span> Надіслати відгук</button>
        </form>
        <!-- контейнер для повідомлення -->
        <div id="formStatus" style="margin-top: 15px; text-align: center;"></div>
    </main>

    <footer>
        <p>© 2026 Карпельов Владислав | ХНУ ім. В. Н. Каразіна | ЕМ-11</p>
        <div class="social-links">
            <a href="https://www.instagram.com/vladyslavkarpelov/"><i class="fab fa-instagram"></i> Instagram</a>  
            <a href="https://t.me/sanitar4ick"><i class="fab fa-telegram-plane"></i> Telegram</a>  
            <a href="https://www.linkedin.com/in/vladyslavkarpelov/"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
        </div>
    </footer>
</div>

<div class="theme-toggle" id="themeToggle">
    <span class="material-icons" id="themeIcon">light_mode</span>
</div>

<script>
    // Перемикання теми (залишаємо без змін)
    (function() {
        const toggle = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
            icon.textContent = 'dark_mode';
        }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
                icon.textContent = 'dark_mode';
            } else {
                localStorage.setItem('theme', 'light');
                icon.textContent = 'light_mode';
            }
        });
    })();

    // Відправка форми на FormSubmit (без перезавантаження)
    const form = document.getElementById('feedbackForm');
    const statusDiv = document.getElementById('formStatus');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();  // не перезавантажуємо сторінку

        // збираємо дані
        const formData = new FormData(form);
        // додаємо приховані поля, необхідні для FormSubmit
        formData.append('_subject', 'Новий відгук з сайту-візитки!');
        formData.append('_captcha', 'true');   // вимикаємо капчу (можна увімкнути, якщо хочете)
        formData.append('_template', 'table');   // гарний формат листа

        statusDiv.innerHTML = '<span class="material-icons" style="font-size:1.2rem; vertical-align:middle;">hourglass_top</span> Відправляємо...';
        statusDiv.style.color = '#2c5e3a';

        try {
            const response = await fetch('https://formsubmit.co/ajax/karpelov.vladyslav@student.karazin.ua', {  // ЗАМІНІТЬ на свою реальну адресу
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.success === 'true' || response.ok) {
                statusDiv.innerHTML = '<span class="material-icons" style="font-size:1.2rem; vertical-align:middle;">check_circle</span> Дякуємо! Ваш відгук надіслано.';
                statusDiv.style.color = '#1e7e34';
                form.reset();  // очищаємо форму
                setTimeout(() => { statusDiv.innerHTML = ''; }, 5000);
            } else {
                throw new Error('Помилка сервера');
            }
        } catch (error) {
            statusDiv.innerHTML = '<span class="material-icons" style="font-size:1.2rem; vertical-align:middle;">error</span> Сталася помилка. Спробуйте пізніше або напишіть мені безпосередньо в Telegram.';
            statusDiv.style.color = '#b33';
        }
    });
</script>
</body>
</html>
